<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYTESTORM | 2026 EDITION</title>
    <style>
        :root { --bg: #000; --text: #fff; --sub: #666; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', 'Segoe UI', sans-serif; overflow: hidden; }
        
        .main { display: flex; height: 100vh; width: 100%; }

        /* Left side: The Visuals */
        .visual { flex: 1.2; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #111 0%, #000 100%); position: relative; }
        .visual img { width: 80%; max-width: 700px; filter: drop-shadow(0 0 40px rgba(255,255,255,0.1)); }
        
        /* Right side: The Info */
        .content { flex: 0.8; padding: 80px; display: flex; flex-direction: column; justify-content: center; border-left: 1px solid #1a1a1a; }
        
        .exclusive { font-size: 0.7rem; letter-spacing: 3px; color: var(--sub); text-transform: uppercase; margin-bottom: 10px; border-left: 2px solid #fff; padding-left: 10px; }
        h1 { font-size: 4.5rem; font-weight: 900; margin: 0; line-height: 0.85; letter-spacing: -3px; }
        .edition { font-size: 1.5rem; color: var(--sub); margin-top: 10px; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; }

        .description { margin: 40px 0; font-size: 1.1rem; line-height: 1.6; color: #ccc; max-width: 400px; }
        
        /* PayPal Section */
        #paypal-button-container { margin-top: 30px; width: 100%; max-width: 350px; }

        footer { position: absolute; bottom: 30px; right: 80px; font-size: 0.6rem; color: #222; letter-spacing: 2px; }

        @media (max-width: 1000px) {
            .main { flex-direction: column; overflow-y: auto; }
            .visual { height: 60vh; flex: none; }
            .content { padding: 40px; text-align: center; border-left: none; align-items: center; }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

<div class="main">

        <img src="mockup.jpg" alt="Bytestorm Esports Casual 2026">
    </div>

    <div class="content">
